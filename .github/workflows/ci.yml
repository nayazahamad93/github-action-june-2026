name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Start App
        run: npm start &

      - name: Wait
        run: sleep 10

      - name: Health Check
        run: curl -I http://localhost:3000